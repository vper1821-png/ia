apiVersion: apps/v1
kind: Deployment
metadata:
  name: text2sql-agent
  namespace: ia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: text2sql-agent
  template:
    metadata:
      labels:
        app: text2sql-agent
    spec:
      containers:
      - name: agent
        image: ghcr.io/vper1821-png/ia/text2sql-agent:main
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        # Desde Secret db-credentials
        - name: MYSQL_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: MYSQL_HOST
        - name: MYSQL_PORT
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: MYSQL_PORT
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: MYSQL_DATABASE
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: MYSQL_USER
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: MYSQL_PASSWORD
        # Desde ConfigMap
        - name: OLLAMA_HOST
          valueFrom:
            configMapKeyRef:
              name: text2sql-config
              key: OLLAMA_HOST
        - name: OLLAMA_PORT
          valueFrom:
            configMapKeyRef:
              name: text2sql-config
              key: OLLAMA_PORT
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
      # Si tu repositorio es privado, necesitas imagePullSecrets
      # imagePullSecrets:
      # - name: regcred
